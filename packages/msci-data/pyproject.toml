[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "msci-data"
version = "1.0.0"
description = "Download MSCI index levels as pandas DataFrames — end-of-day levels for any MSCI index, any return variant (Price/Net/Gross). No API key required."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    {name = "Nikhil Suthar", email = "nikhil.suthar@lumiq.ai"},
]
keywords = [
    "msci", "msci-data", "msci-index", "esg", "emerging-markets",
    "world-index", "acwi", "index-levels", "market-data",
    "financial-data", "pandas", "trading", "historical-data"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial :: Investment",
    "Typing :: Typed",
]
dependencies = [
    "requests>=2.31.0",
    "pandas>=2.0.0",
]

[project.optional-dependencies]
s3     = ["boto3>=1.28.0"]
polars = ["polars>=0.20.0"]
dev    = ["pytest", "pytest-cov", "ruff"]

[project.scripts]
msci-data = "mscidata.cli:main"

[project.urls]
Homepage      = "https://github.com/NikhilSuthar/indian-market-data"
Documentation = "https://NikhilSuthar.github.io/indian-market-data"
Repository    = "https://github.com/NikhilSuthar/indian-market-data"
"Bug Tracker" = "https://github.com/NikhilSuthar/indian-market-data/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
