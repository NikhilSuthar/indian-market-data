name: Publish mcx-data

# Triggers:
#   - Push tag  mcx-v*          → publish to PyPI (production)
#   - Manual dispatch           → publish to TestPyPI or PyPI (your choice)
#
# For TestPyPI: use workflow_dispatch manually from GitHub Actions tab

on:
  push:
    tags:
      - "mcx-v*"          # e.g. mcx-v0.1.0 → triggers PyPI publish
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    name: Build mcx-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/mcx-data
      - uses: actions/upload-artifact@v4
        with:
          name: mcx-data-dist
          path: packages/mcx-data/dist/

  publish-testpypi:
    name: Publish mcx-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/mcx-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcx-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish mcx-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/mcx-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/mcx-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcx-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
