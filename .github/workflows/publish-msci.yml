name: Publish msci-data

# Triggers:
#   - Push tag  msci-v*         → build + publish to PyPI + create GitHub Release
#   - Manual dispatch           → publish to TestPyPI or PyPI (your choice)

on:
  push:
    tags:
      - "msci-v*"         # e.g. msci-v1.0.0
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build msci-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/msci-data
      - uses: actions/upload-artifact@v4
        with:
          name: msci-data-dist
          path: packages/msci-data/dist/

  publish-testpypi:
    name: Publish msci-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/msci-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: msci-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish msci-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/msci-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/msci-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: msci-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release — msci-data
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/msci-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: msci-data-dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "msci-data ${{ github.ref_name }}"
          body: |
            ## msci-data ${{ github.ref_name }}

            Download MSCI index levels as pandas DataFrames. No API key required.

            ### Install
            ```bash
            pip install msci-data
            ```

            ### Quick Start
            ```python
            from mscidata import msci
            df = msci.get_levels("990100", "2026-01-01", "2026-07-01")
            ```

            ### Links
            - [PyPI](https://pypi.org/project/msci-data/)
            - [Documentation](https://NikhilSuthar.github.io/indian-market-data)
          files: dist/*
          draft: false
          prerelease: false
