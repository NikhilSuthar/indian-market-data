name: Publish nse-data

on:
  push:
    branches: ["release/*"]
    paths: ["packages/nse-data/**", "src/**"]
    tags: ["nse-v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    name: Build nse-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/nse-data
      - uses: actions/upload-artifact@v4
        with:
          name: nse-data-dist
          path: packages/nse-data/dist/

  publish-testpypi:
    name: Publish nse-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/heads/release/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/nse-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nse-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish nse-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/nse-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/nse-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nse-data-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
