name: Publish indian-market-data (umbrella)

on:
  push:
    tags: ["v*"]   # tag like v0.9.0 publishes umbrella
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    name: Build indian-market-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/indian-market-data
      - uses: actions/upload-artifact@v4
        with:
          name: umbrella-dist
          path: packages/indian-market-data/dist/

  publish-testpypi:
    name: Publish indian-market-data → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/indian-market-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: umbrella-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish indian-market-data → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/indian-market-data/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: umbrella-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
